<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Outlook Login - Processing...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI'; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #0078D4 0%, #005a9e 100%); }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0078D4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { color: #333; margin: 0 0 10px; font-size: 24px; }
        p { color: #666; margin: 0; }
        .error { color: #ef4444; background: #fef2f2; padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Signing in with Outlook...</h1>
        <p>Please wait while we complete your authentication</p>
        <div class="error" id="error"></div>
    </div>
    <!-- oauth-base.js defines OAuthBase (OutlookSSO extends it); outlook-sso.js's
         built-in callback handler exchanges the code and redirects to the app. -->
    <script src="js/api-config.js"></script>
    <script src="js/oauth-base.js"></script>
    <script src="js/outlook-sso.js"></script>
</body>
</html>

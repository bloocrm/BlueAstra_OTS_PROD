<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webex Login - Processing...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            margin: 0 0 10px;
            font-size: 24px;
        }

        p {
            color: #666;
            margin: 0;
        }

        .error {
            color: #ef4444;
            background: #fef2f2;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .success-message {
            color: #22c55e;
            background: #f0fdf4;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1 id="title">Signing in with Webex...</h1>
        <p id="subtitle">Please wait while we complete your authentication</p>
        <div class="error" id="error"></div>
        <div class="success-message" id="success"></div>
    </div>

    <script src="js/webex-sso.js"></script>
    <script>
        // Handle OAuth callback
        async function handleCallback() {
            try {
                // Get authorization code from URL
                const params = new URLSearchParams(window.location.hash.substring(1) || window.location.search.substring(1));
                const code = params.get('code');
                const state = params.get('state');

                console.log('OAuth callback - Code:', code);

                // Verify state parameter
                const savedState = sessionStorage.getItem('webexOAuthState');
                if (state !== savedState) {
                    throw new Error('Invalid state parameter - possible CSRF attack');
                }

                if (!code) {
                    throw new Error('No authorization code received');
                }

                // Initialize WebexSSO
                const webexSSO = new WebexSSO();

                // Exchange code for token
                await webexSSO.exchangeCodeForToken(code);

                // Show success message
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = '✅ Authentication Successful!';
                document.getElementById('subtitle').textContent = 'Redirecting to Webex User Hub...';

                const successDiv = document.getElementById('success');
                successDiv.textContent = 'Logging you into Webex User Hub...';
                successDiv.style.display = 'block';

                // Redirect to Webex User Hub after 2 seconds
                setTimeout(() => {
                    console.log('✅ Authentication successful, redirecting to Webex User Hub...');
                    window.location.href = 'https://userhub-by.webex.com/webappng/hub/meeting/home';
                }, 2000);

            } catch (error) {
                console.error('Authentication error:', error);
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('title').textContent = '❌ Authentication Failed';
                document.getElementById('subtitle').textContent = error.message;

                const errorDiv = document.getElementById('error');
                errorDiv.textContent = `Error: ${error.message}`;
                errorDiv.style.display = 'block';
            }
        }

        // Run on page load
        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>

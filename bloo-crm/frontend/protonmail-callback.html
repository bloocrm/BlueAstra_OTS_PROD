<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ProtonMail Login - Processing...</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI'; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #6D4AFF 0%, #4a2fa1 100%); }
        .container { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #6D4AFF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { color: #333; margin: 0 0 10px; font-size: 24px; }
        p { color: #666; margin: 0; }
        .error { color: #ef4444; background: #fef2f2; padding: 15px; border-radius: 5px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Signing in with ProtonMail...</h1>
        <p>Please wait while we complete your authentication</p>
        <div class="error" id="error"></div>
    </div>
    <script src="js/protonmail-sso.js"></script>
    <script>
        async function handleCallback() {
            try {
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                const state = params.get('state');

                if (!code) throw new Error('No authorization code received');

                const savedState = sessionStorage.getItem('protonmailState');
                if (state !== savedState) throw new Error('Invalid state parameter - CSRF validation failed');

                const protonmailSSO = new ProtonMailSSO();
                await protonmailSSO.exchangeCodeForToken(code);

                console.log('✅ ProtonMail authentication successful, redirecting to ProtonMail...');
                setTimeout(() => {
                    window.location.href = 'https://mail.protonmail.com/';
                }, 2000);
            } catch (error) {
                console.error('ProtonMail authentication error:', error);
                document.getElementById('error').textContent = `Error: ${error.message}`;
                document.getElementById('error').style.display = 'block';
            }
        }
        document.addEventListener('DOMContentLoaded', handleCallback);
    </script>
</body>
</html>
